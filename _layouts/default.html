<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'vi' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title | default: "Unified Diagnostic Services" }}</title>
  <meta name="description" content="{{ page.description | default: site.description | default: site.title | escape }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
</head>

<body>
  <div class="site-shell">

    <header class="site-header">
      <a class="home-btn" href="{{ '/' | relative_url }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10a1 1 0 001 1h3v-6h6v6h3a1 1 0 001-1V10"/></svg>
        Home
      </a>
      <div class="header-actions">
        <button class="icon-btn" id="toc-toggle" title="Mục lục">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        </button>
        <button class="icon-btn" id="theme-toggle" title="Đổi giao diện sáng/tối">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
        </button>
      </div>
    </header>

    <main class="page-card">
      {% if page.tags %}
      <div class="page-tags">
        {% for t in page.tags %}<span class="tag-badge">{{ t }}</span>{% endfor %}
      </div>
      {% endif %}
      {{ content }}
    </main>

    <aside class="toc-panel is-hidden" id="toc-panel">
      <div class="toc-panel__header">
        <p class="toc-panel__title" style="margin:0">Mục lục</p>
        <button class="toc-close-btn" id="toc-close" title="Đóng">&times;</button>
      </div>
      <p class="toc-panel__title" id="toc-title-desktop">Mục lục</p>
      <div class="toc-panel__list"></div>
    </aside>
    <div class="toc-backdrop" id="toc-backdrop"></div>

  </div>
</body>
</html>
